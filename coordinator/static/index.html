<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swarm Dashboard</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: monospace;
      background-color: #111;
      color: #0f0;
    }

    #dashboard-container {
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 200px;
      background-color: #222;
      padding: 20px;
      box-sizing: border-box;
      border-right: 2px solid #0f0;
    }

    #sidebar h2 {
      margin-top: 0;
    }

    #sidebar button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: #333;
      color: #0f0;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #sidebar button:hover {
      background: #444;
    }

    #main-content {
      flex-grow: 1;
      padding: 20px;
      overflow-y: auto;
    }

    #database-table {
      width: 100%;
      border-collapse: collapse;
    }

    #database-table th, #database-table td {
      border: 1px solid #0f0;
      padding: 8px;
      text-align: left;
    }

    #logs {
      white-space: pre-wrap;
      background-color: #111;
      padding: 10px;
      border: 1px solid #0f0;
      height: 80vh;
      overflow-y: auto;
    }
  </style>
</head>
<body>
<div id="dashboard-container">
  <div id="sidebar">
    <h2>Dashboard</h2>
    <button onclick="showSection('database')">Database View</button>
    <button onclick="showSection('logs')">Logs View</button>
  </div>

  <div id="main-content">
    <div id="database-section">
      <h2>Connected Smart Nodes</h2>
      <table id="database-table">
        <thead>
          <tr>
            <th>UUID</th>
            <th>AP Port</th>
            <th>Current AP</th>
            <th>Current Swarm</th>
            <th>Last Update</th>
            <th>Virt IP</th>
          </tr>
        </thead>
        <tbody id="db-table-body">
        </tbody>
      </table>
    </div>

    <div id="logs-section" style="display:none;">
      <h2>Live Logs</h2>
      <div id="logs"></div>
    </div>
  </div>
</div>

<script>
function showSection(section) {
  if (section === 'database') {
    document.getElementById('database-section').style.display = 'block';
    document.getElementById('logs-section').style.display = 'none';
  } else if (section === 'logs') {
    document.getElementById('database-section').style.display = 'none';
    document.getElementById('logs-section').style.display = 'block';
  }
}

// Connect to WebSocket for logs
const logWs = new WebSocket(`ws://${location.host}/ws/logs`);
logWs.onopen = function() {
  console.log('✅ Connected to Log WebSocket');
};
logWs.onmessage = function(event) {
  const line = document.createElement("div");
  line.textContent = event.data;
  document.getElementById("logs").prepend(line);
};

// Connect to WebSocket for database
const dbWs = new WebSocket(`ws://${location.host}/ws/database`);
dbWs.onopen = function() {
  console.log('✅ Connected to Database WebSocket');
};
dbWs.onmessage = function(event) {
  console.log('📩 New Database snapshot received');
  const data = JSON.parse(event.data);

  const tbody = document.getElementById('db-table-body');
  tbody.innerHTML = ''; // clear previous entries

  for (const node of data) {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${node.uuid}</td>
      <td>${node.ap_port}</td>
      <td>${node.current_ap}</td>
      <td>${node.current_swarm}</td>
      <td>${node.last_update}</td>
      <td>${node.virt_ip}</td>
    `;
    tbody.appendChild(row);
  }
};
</script>

</body>
</html>
